# Nexus Strategy — base configuration (all defaults)
# Profile: balanced

[general]
max_open_trades = 10
base_timeframe = "5m"
informative_timeframes = ["15m", "1h", "4h", "1d"]
profile = "balanced"
min_confidence = 45
min_consensus = 2
dry_run = true

[risk]
max_exposure = 0.85
max_single_pair = 0.20
max_sector = 0.35
min_sectors = 3
max_correlation = 0.85
kelly_fraction = 0.50
drawdown_caution = 0.05
drawdown_warning = 0.10
drawdown_critical = 0.15
drawdown_catastrophic = 0.20

[regime]
transition_min_candles = 3
panic_instant_transition = true
high_confidence_threshold = 70
markov_lookback_candles = 2016

[strategy_weights]
mean_reversion = 1.0
trend_following = 1.0
momentum_breakout = 1.0
volatility_squeeze = 1.0
volume_profile = 1.0
divergence = 1.0
market_structure = 1.0

[dca]
enabled = true
max_dca_count = 4
min_dca_interval_candles = 6
require_technical_confirmation = true

[exit]
emergency_drop_pct = 0.10
doom_stop_default = 0.08
portfolio_total_loss_limit = 0.20
trailing_atr_multiplier = 2.5
time_decay_enabled = true
time_decay_rate_per_6h = 0.10
max_time_decay = 0.50

[sentinel]
enabled = true
redis_url = "redis://localhost:6379/0"
fallback_json_path = "sentinel_data.json"
stale_threshold_seconds = 300
risk_shutdown_threshold = 90
risk_defensive_threshold = 80

[learning]
enabled = true
min_trades_for_learning = 20
base_learning_rate = 0.01
max_parameter_drift = 0.50
cooldown_candles = 288
backtest_learning = false

[analytics]
decision_logging = true
prometheus_enabled = true
prometheus_port = 9090
trade_journal_enabled = true
daily_report = true
weekly_report = true

# Strategy-specific config sections
[strategies.mean_reversion]
rsi_period = 14
rsi_oversold = 30
rsi_overbought = 70
bb_period = 20
bb_std = 2.0

[strategies.trend_following]
ema_fast = 12
ema_slow = 26
adx_period = 14
adx_threshold = 25

[strategies.momentum_breakout]
lookback_candles = 20
volume_multiplier = 1.5
atr_period = 14

[strategies.volatility_squeeze]
bb_period = 20
kc_period = 20
kc_multiplier = 1.5

[strategies.volume_profile]
vah_percentile = 70
val_percentile = 30
poc_tolerance = 0.001

[strategies.divergence]
rsi_period = 14
macd_fast = 12
macd_slow = 26
macd_signal = 9

[strategies.market_structure]
swing_lookback = 5
structure_tolerance = 0.002

# Regime-specific weight overrides
[regime_weights.trending_up]
mean_reversion = 0.5
trend_following = 1.8
momentum_breakout = 1.5
volatility_squeeze = 0.8
volume_profile = 1.0
divergence = 0.7
market_structure = 1.2

[regime_weights.trending_down]
mean_reversion = 0.5
trend_following = 1.5
momentum_breakout = 0.7
volatility_squeeze = 0.8
volume_profile = 1.0
divergence = 1.2
market_structure = 1.3

[regime_weights.ranging]
mean_reversion = 1.8
trend_following = 0.5
momentum_breakout = 0.7
volatility_squeeze = 1.2
volume_profile = 1.3
divergence = 1.0
market_structure = 0.8

[regime_weights.volatile]
mean_reversion = 0.7
trend_following = 0.8
momentum_breakout = 1.5
volatility_squeeze = 1.8
volume_profile = 1.0
divergence = 0.8
market_structure = 0.7

[regime_weights.panic]
mean_reversion = 0.3
trend_following = 0.5
momentum_breakout = 0.3
volatility_squeeze = 0.5
volume_profile = 0.8
divergence = 1.5
market_structure = 1.5
